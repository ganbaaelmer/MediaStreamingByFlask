<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming Video Recorder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    h1 { margin-bottom: 1.5rem; font-size: 1.6rem; }
    #video {
      max-width: 100%;
      width: 640px;
      border-radius: 8px;
      border: 2px solid #333;
      background: #000;
    }
    .controls {
      margin: 1rem 0;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    button {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    #record { background: #e74c3c; color: #fff; }
    #stop   { background: #555; color: #fff; }
    #download { color: #3498db; text-decoration: none; font-size: 0.95rem; }
    #download:empty { display: none; }
    .audio-section {
      margin-top: 1.5rem;
      text-align: center;
    }
    .audio-section p {
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      color: #aaa;
    }
    audio { width: 320px; }
  </style>
</head>
<body>
  <h1>Streaming Video Recorder</h1>

  <img id="video" src="{{ url_for('video_viewer') }}" alt="Live camera stream">

  <div class="controls">
    <button id="record">Record</button>
    <button id="stop">Stop</button>
    <a id="download" href=""></a>
  </div>

  <div class="audio-section">
    <p>Live Audio</p>
    <audio controls>
      <source src="{{ url_for('audio') }}" type="audio/x-wav;codec=pcm">
      Your browser does not support the audio element.
    </audio>
  </div>

  <script src="{{ url_for('static', filename='recorder.js') }}"></script>
</body>
</html>
